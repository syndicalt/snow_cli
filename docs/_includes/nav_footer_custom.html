<hr>
<button
  id="theme-toggle"
  onclick="(function(){
    var current = localStorage.getItem('snow-cli-theme') || 'dark';
    var next = current === 'dark' ? 'light' : 'dark';
    jtd.setTheme(next);
    localStorage.setItem('snow-cli-theme', next);
    document.getElementById('theme-toggle').textContent = next === 'dark' ? 'Light mode' : 'Dark mode';
  })()"
  style="
    width: 100%;
    padding: 0.5rem 0;
    margin-top: 0.5rem;
    background: none;
    border: 1px solid currentColor;
    border-radius: 4px;
    color: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    opacity: 0.7;
  "
>
  Light mode
</button>
